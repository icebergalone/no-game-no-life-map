<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>迪斯博德 · 游戏人生世界地图</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Noto Serif SC', serif;
        }

        body {
            background: linear-gradient(135deg, #2b3a4a 0%, #1e2d3d 40%, #1a2535 100%);
            color: #c8b88a;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            background-size: 256px 256px;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(10, 15, 20, 0.5) 100%);
        }

        #map-container {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 2;
            overflow: hidden;
            cursor: grab;
        }

        #map-container.grabbing {
            cursor: grabbing;
        }

        #edge-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #node-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .node-wrapper {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: auto;
            cursor: pointer;
            transform: translate(-50%, -50%);
            transition: filter 0.2s;
        }

        .node-wrapper:hover {
            filter: brightness(1.3) drop-shadow(0 0 8px rgba(200, 184, 138, 0.5));
        }

        .node-icon svg {
            display: block;
            filter: drop-shadow(1px 2px 3px rgba(0, 0, 0, 0.7)) drop-shadow(0 0 5px rgba(0, 0, 0, 0.4));
        }

        .node-label {
            margin-top: 5px;
            white-space: nowrap;
            text-align: center;
            color: #f0e8d0;
            font-weight: 700;
            text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
            font-family: 'Noto Serif SC', serif;
            line-height: 1.3;
            background: rgba(12, 18, 28, 0.82);
            padding: 3px 10px;
            border-radius: 4px;
        }

        .node-wrapper[data-tier="major"] .node-icon svg {
            filter: drop-shadow(1px 2px 3px rgba(0, 0, 0, 0.7)) drop-shadow(0 0 8px rgba(200, 168, 80, 0.35));
        }

        .node-wrapper[data-tier="major"] .node-label {
            color: #f0e4c4;
            font-weight: 700;
        }

        .detail-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(5, 10, 18, 0.75);
            backdrop-filter: blur(6px);
            justify-content: center;
            align-items: center;
        }

        .detail-overlay.active {
            display: flex;
        }

        .detail-panel {
            position: relative;
            width: 90%;
            max-width: 680px;
            max-height: 85vh;
            background: linear-gradient(160deg, rgba(28, 36, 48, 0.97) 0%, rgba(22, 30, 42, 0.98) 100%);
            border: 1px solid rgba(200, 184, 138, 0.25);
            border-radius: 12px;
            overflow-y: auto;
            padding: 0;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6), 0 0 60px rgba(200, 184, 138, 0.05);
        }

        .detail-panel::-webkit-scrollbar {
            width: 6px;
        }

        .detail-panel::-webkit-scrollbar-track {
            background: transparent;
        }

        .detail-panel::-webkit-scrollbar-thumb {
            background: rgba(200, 184, 138, 0.2);
            border-radius: 3px;
        }

        .detail-close {
            position: sticky;
            top: 0;
            right: 0;
            z-index: 10;
            float: right;
            margin: 12px 12px 0 0;
            width: 32px;
            height: 32px;
            border: 1px solid rgba(200, 184, 138, 0.2);
            background: rgba(20, 28, 36, 0.9);
            color: #c8b88a;
            font-size: 18px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .detail-close:hover {
            background: rgba(200, 184, 138, 0.15);
        }

        .detail-header {
            padding: 28px 28px 16px;
            border-bottom: 1px solid rgba(200, 184, 138, 0.1);
            background: linear-gradient(180deg, rgba(200, 184, 138, 0.04) 0%, transparent 100%);
        }

        .detail-title {
            font-family: 'Cinzel', 'Noto Serif SC', serif;
            font-size: 22px;
            font-weight: 700;
            color: #e8dcc0;
            margin-bottom: 8px;
            line-height: 1.3;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .detail-title svg {
            flex-shrink: 0;
            filter: drop-shadow(1px 2px 3px rgba(0, 0, 0, 0.5));
        }

        .detail-type-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            background: rgba(200, 184, 138, 0.12);
            color: #c8b88a;
            border: 1px solid rgba(200, 184, 138, 0.2);
            font-family: 'Noto Serif SC', serif;
            letter-spacing: 0.5px;
        }

        .detail-summary {
            padding: 16px 28px;
            color: #b8b8a8;
            font-size: 14px;
            line-height: 1.8;
            white-space: pre-line;
            border-bottom: 1px solid rgba(200, 184, 138, 0.08);
        }

        .detail-body {
            padding: 8px 28px 28px;
        }

        .detail-section {
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid rgba(200, 184, 138, 0.06);
        }

        .detail-section:first-child {
            margin-top: 8px;
            border-top: none;
            padding-top: 0;
        }

        .detail-section-title {
            font-size: 13px;
            font-weight: 600;
            color: #c8b88a;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .detail-section-title::before {
            content: '';
            display: inline-block;
            width: 3px;
            height: 14px;
            background: linear-gradient(180deg, #c8a84a, #8a6a3a);
            border-radius: 2px;
        }

        .detail-section-content {
            color: #a8a898;
            font-size: 13px;
            line-height: 1.7;
            white-space: pre-line;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .detail-grid-item {
            background: rgba(200, 184, 138, 0.04);
            border: 1px solid rgba(200, 184, 138, 0.08);
            border-radius: 6px;
            padding: 8px 10px;
        }

        .detail-grid-item .grid-label {
            font-size: 11px;
            color: #8a8a7a;
            margin-bottom: 3px;
        }

        .detail-grid-item .grid-value {
            font-size: 12px;
            color: #c0b8a0;
            line-height: 1.5;
            white-space: pre-line;
        }

        .detail-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .detail-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 12px;
            background: rgba(200, 184, 138, 0.08);
            color: #b8a880;
            border: 1px solid rgba(200, 184, 138, 0.12);
            line-height: 1.4;
        }

        .detail-connections {
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid rgba(200, 184, 138, 0.06);
        }

        .detail-conn-item {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            margin: 3px 4px 3px 0;
            border-radius: 8px;
            font-size: 12px;
            background: rgba(100, 140, 180, 0.08);
            color: #8ab0c8;
            border: 1px solid rgba(100, 140, 180, 0.15);
            cursor: pointer;
            transition: background 0.2s;
        }

        .detail-conn-item:hover {
            background: rgba(100, 140, 180, 0.18);
        }

        .detail-conn-dist {
            font-size: 10px;
            color: #6a8a9a;
            margin-left: 2px;
        }

        .edit-toolbar {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 60;
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .edit-btn {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            font-family: 'Noto Serif SC', serif;
            border: 1px solid rgba(200, 184, 138, 0.3);
            background: rgba(20, 28, 36, 0.9);
            color: #c8b88a;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }

        .edit-btn:hover {
            background: rgba(200, 184, 138, 0.15);
        }

        .edit-btn.active {
            background: rgba(200, 168, 80, 0.25);
            border-color: rgba(200, 168, 80, 0.6);
            color: #f0e4c4;
        }

        .edit-btn.danger.active {
            background: rgba(180, 60, 60, 0.25);
            border-color: rgba(200, 80, 80, 0.6);
            color: #f0a0a0;
        }

        .edit-hint {
            font-size: 11px;
            color: #8a8a7a;
            margin-left: 8px;
            font-family: 'Noto Serif SC', serif;
        }

        .node-wrapper.editing {
            cursor: move;
        }

        .node-wrapper.editing:hover {
            filter: brightness(1.3) drop-shadow(0 0 12px rgba(200, 168, 80, 0.6));
        }

        .special-marker-worldscar {
            position: absolute;
            pointer-events: none;
            z-index: -1;
        }

        .special-marker-worldscar::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100px;
            height: 100px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 170, 50, 0.4) 0%, rgba(255, 140, 30, 0.1) 50%, transparent 70%);
            animation: pulse-worldscar 3s ease-in-out infinite;
        }

        .special-marker-worldscar::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 120px;
            height: 120px;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255, 170, 50, 0.4);
            border-radius: 50%;
            animation: ring-worldscar 3s ease-in-out infinite;
        }

        @keyframes pulse-worldscar {

            0%,
            100% {
                opacity: 0.5;
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2);
            }
        }

        @keyframes ring-worldscar {

            0%,
            100% {
                opacity: 0.3;
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                opacity: 0.8;
                transform: translate(-50%, -50%) scale(1.1);
            }
        }

        .special-badge-worldscar {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            font-size: 10px;
            font-weight: 700;
            color: #ffaa32;
            background: rgba(30, 18, 5, 0.9);
            padding: 2px 8px;
            border-radius: 10px;
            border: 1px solid rgba(255, 170, 50, 0.5);
            letter-spacing: 1px;
            pointer-events: none;
            text-shadow: 0 0 6px rgba(255, 170, 50, 0.6);
            animation: badge-glow-worldscar 2s ease-in-out infinite alternate;
        }

        @keyframes badge-glow-worldscar {
            0% {
                box-shadow: 0 0 4px rgba(255, 170, 50, 0.3);
            }

            100% {
                box-shadow: 0 0 12px rgba(255, 170, 50, 0.6);
            }
        }

        .special-marker-player {
            position: absolute;
            pointer-events: none;
            z-index: -1;
        }

        .special-marker-player::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 90px;
            height: 90px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 220, 130, 0.4) 0%, rgba(0, 220, 130, 0.1) 50%, transparent 70%);
            animation: pulse-player 2.5s ease-in-out infinite;
        }

        .special-marker-player::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 110px;
            height: 110px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 2px solid rgba(0, 220, 130, 0.5);
            animation: ring-player 3s ease-in-out infinite;
        }

        @keyframes pulse-player {

            0%,
            100% {
                opacity: 0.5;
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2);
            }
        }

        @keyframes ring-player {

            0%,
            100% {
                opacity: 0.3;
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                opacity: 0.8;
                transform: translate(-50%, -50%) scale(1.1);
            }
        }

        .special-badge-player {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            font-size: 10px;
            font-weight: 700;
            color: #00dc82;
            background: rgba(10, 20, 15, 0.9);
            padding: 2px 8px;
            border-radius: 10px;
            border: 1px solid rgba(0, 220, 130, 0.5);
            letter-spacing: 1px;
            pointer-events: none;
            text-shadow: 0 0 6px rgba(0, 220, 130, 0.6);
            animation: badge-glow-player 2s ease-in-out infinite alternate;
        }

        @keyframes badge-glow-player {
            0% {
                box-shadow: 0 0 4px rgba(0, 220, 130, 0.3);
            }

            100% {
                box-shadow: 0 0 12px rgba(0, 220, 130, 0.6);
            }
        }

        .edge-delete-hit {
            position: absolute;
            pointer-events: auto;
            cursor: pointer;
            z-index: 3;
        }
    </style>
</head>

        function worldToScreen(wx, wy) {

        function resizeCanvas() {

        function renderEdges() {
            ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
            ctx.save();
            ctx.strokeStyle = 'rgba(180,164,130,0.55)';
            ctx.lineWidth = 2.2 * scale;
            ctx.setLineDash([8 * scale, 5 * scale]);
            ctx.lineCap = 'round';

            edges.forEach(e => {
                const src = nodeMap[e.source];
                const tgt = nodeMap[e.target];
                if (!src || !tgt) return;
                const s = worldToScreen(src.x, src.y);
                const t = worldToScreen(tgt.x, tgt.y);
                ctx.beginPath();
                ctx.moveTo(s.x, s.y);
                ctx.lineTo(t.x, t.y);
                ctx.stroke();
            });
            ctx.restore();

            // 连线标签
            ctx.save();
            const labelFontSize = Math.max(11, 12 * scale);
            ctx.font = `500 ${labelFontSize}px 'Noto Serif SC', serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            const nodeRects = [];
            nodes.forEach(n => {
                const p = worldToScreen(n.x, n.y);
                const cfg = typeConfig[n.type] || typeConfig.poi;
                const hw = (cfg.size * 0.5 + 40) * Math.min(1.2, Math.max(0.5, scale));
                const hh = (cfg.size * 0.5 + 16) * Math.min(1.2, Math.max(0.5, scale));
                nodeRects.push({ x: p.x - hw, y: p.y - hh, w: hw * 2, h: hh * 2 });
            });

            function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
                return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
            }

            edges.forEach(e => {
                const src = nodeMap[e.source];
                const tgt = nodeMap[e.target];
                if (!src || !tgt) return;
                const s = worldToScreen(src.x, src.y);
                const t = worldToScreen(tgt.x, tgt.y);
                let mx = (s.x + t.x) / 2;
                let my = (s.y + t.y) / 2;
                if (scale < 0.45) return;
                const text = e.label || '';
                if (!text) return;
                const tw = ctx.measureText(text).width;
                const ph = Math.max(16, 18 * scale);
                const pw = tw + 16;

                const dx = t.x - s.x;
                const dy = t.y - s.y;
                const len = Math.sqrt(dx * dx + dy * dy) || 1;
                const nx = -dy / len;
                const ny = dx / len;
                const nudgeStep = 18;
                for (let attempt = 0; attempt < 6; attempt++) {
                    let overlaps = false;
                    for (const nr of nodeRects) {
                        if (rectsOverlap(mx - pw / 2, my - ph / 2, pw, ph, nr.x, nr.y, nr.w, nr.h)) {
                            overlaps = true;
                            break;
                        }
                    }
                    if (!overlaps) break;
                    if (attempt % 2 === 0) {
                        mx += nx * nudgeStep;
                        my += ny * nudgeStep;
                    } else {
                        mx -= nx * nudgeStep * 2;
                        my -= ny * nudgeStep * 2;
                    }
                }

                ctx.fillStyle = 'rgba(12,18,28,0.88)';
                ctx.beginPath();
                ctx.roundRect(mx - pw / 2, my - ph / 2, pw, ph, 4);
                ctx.fill();
                ctx.strokeStyle = 'rgba(138,122,90,0.25)';
                ctx.lineWidth = 0.6;
                ctx.setLineDash([]);
                ctx.stroke();
                ctx.fillStyle = '#c8b890';
                ctx.fillText(text, mx, my);
            });
            ctx.restore();
        }

                    bodyHtml += `<div class="detail-section">
                    <div class="detail-section-title">${escHtml(FIELD_LABELS[key])}</div>
                    <div class="detail-tags">`;
                    val.forEach(item => {
                        bodyHtml += `<span class="detail-tag">${escHtml(String(item))}</span>`;
                    });
                    bodyHtml += `</div></div>`;
                } else if (typeof val === 'object') {
                    continue;
                } else {
                    const strVal = String(val).trim();
                    if (!strVal) continue;
                    bodyHtml += `<div class="detail-section">
                    <div class="detail-section-title">${escHtml(FIELD_LABELS[key])}</div>
                    <div class="detail-section-content">${escHtml(strVal)}</div>
                </div>`;
                }
            }

            const connections = [];
            edges.forEach(e => {
                if (e.source === node.id && nodeMap[e.target]) {
                    connections.push({ node: nodeMap[e.target], label: e.label, distance: e.distance });
                } else if (e.target === node.id && nodeMap[e.source]) {
                    connections.push({ node: nodeMap[e.source], label: e.label, distance: e.distance });
                }
            });
            if (connections.length > 0) {
                bodyHtml += `<div class="detail-connections">
                <div class="detail-section-title">连接地点</div>
                <div style="display:flex; flex-wrap:wrap;">`;
                connections.forEach(c => {
                    bodyHtml += `<div class="detail-conn-item" data-target-id="${c.node.id}">
                    <svg width="16" height="16" viewBox="0 0 32 32" style="flex-shrink:0;"><use href="#icon-${c.node.type}"/></svg>
                    <span>${escHtml(c.node.name)}</span>
                    ${c.label ? `<span class="detail-conn-dist">· ${escHtml(c.label)}</span>` : ''}
                    ${c.distance ? `<span class="detail-conn-dist">(${escHtml(String(c.distance))})</span>` : ''}
                </div>`;
                });
                bodyHtml += `</div></div>`;
            }

            detailBody.innerHTML = bodyHtml;

            detailBody.querySelectorAll('.detail-conn-item').forEach(el => {
                el.addEventListener('click', () => {
                    const targetId = el.dataset.targetId;
                    const targetNode = nodeMap[targetId];
                    if (targetNode) openDetail(targetNode);
                });
            });

            detailOverlay.classList.add('active');
            detailPanel.scrollTop = 0;
        }

        function escHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        detailClose.addEventListener('click', () => {
            detailOverlay.classList.remove('active');
        });
        detailOverlay.addEventListener('click', (e) => {
            if (e.target === detailOverlay) detailOverlay.classList.remove('active');
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') detailOverlay.classList.remove('active');
        });

        function renderMinimap() {
            const dpr = devicePixelRatio;
            const mw = 150 * dpr, mh = 120 * dpr;
            minimapCtx.clearRect(0, 0, mw, mh);

            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            nodes.forEach(n => {
                const wx = n.x * SPREAD, wy = n.y * SPREAD;
                if (wx < minX) minX = wx; if (wx > maxX) maxX = wx;
                if (wy < minY) minY = wy; if (wy > maxY) maxY = wy;
            });
            const pad = 100;
            minX -= pad; maxX += pad; minY -= pad; maxY += pad;
            const rangeX = maxX - minX, rangeY = maxY - minY;
            const mScale = Math.min(mw / rangeX, mh / rangeY) * 0.9;
            const offX = (mw - rangeX * mScale) / 2;
            const offY = (mh - rangeY * mScale) / 2;

            function miniPos(wx, wy) {
                return { x: offX + (wx - minX) * mScale, y: offY + (wy - minY) * mScale };
            }

            minimapCtx.strokeStyle = 'rgba(138,122,90,0.25)';
            minimapCtx.lineWidth = 0.5 * dpr;
            minimapCtx.setLineDash([]);
            edges.forEach(e => {
                const src = nodeMap[e.source], tgt = nodeMap[e.target];
                if (!src || !tgt) return;
                const s = miniPos(src.x * SPREAD, src.y * SPREAD);
                const t = miniPos(tgt.x * SPREAD, tgt.y * SPREAD);
                minimapCtx.beginPath();
                minimapCtx.moveTo(s.x, s.y);
                minimapCtx.lineTo(t.x, t.y);
                minimapCtx.stroke();
            });

            nodes.forEach(n => {
                const p = miniPos(n.x * SPREAD, n.y * SPREAD);
                minimapCtx.fillStyle = n.type === 'city' || n.type === 'castle' ? '#c8b88a' : 'rgba(200,184,138,0.5)';
                minimapCtx.beginPath();
                minimapCtx.arc(p.x, p.y, (n.type === 'city' || n.type === 'castle' ? 2.5 : 1.5) * dpr, 0, Math.PI * 2);
                minimapCtx.fill();
            });

            const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
            const vpLeft = (-viewX - cx / scale), vpTop = (-viewY - cy / scale);
            const vpRight = (-viewX + cx / scale), vpBottom = (-viewY + cy / scale);
            const tl = miniPos(vpLeft, vpTop);
            const br = miniPos(vpRight, vpBottom);
            minimapCtx.strokeStyle = 'rgba(200,184,138,0.5)';
            minimapCtx.lineWidth = 1 * dpr;
            minimapCtx.setLineDash([]);
            minimapCtx.strokeRect(tl.x, tl.y, br.x - tl.x, br.y - tl.y);
        }

        const mouseCoordDiv = document.getElementById('mouse-coords');
        container.addEventListener('mousemove', (e) => {
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            const worldX = ((e.clientX - cx) / scale - viewX) / SPREAD;
            const worldY = ((e.clientY - cy) / scale - viewY) / SPREAD;
            mouseCoordDiv.textContent = `世界坐标: (${worldX.toFixed(1)}, ${worldY.toFixed(1)})`;
        });
        container.addEventListener('mouseleave', () => {
            mouseCoordDiv.textContent = '世界坐标: (—, —)';
        });

        function buildLegend() {
            const legendItems = document.getElementById('legend-items');
            const usedTypes = new Set(nodes.map(n => n.type));
            legendItems.innerHTML = '';
            Object.keys(typeConfig).forEach(type => {
                if (!usedTypes.has(type)) return;
                const cfg = typeConfig[type];
                const item = document.createElement('div');
                item.style.cssText = 'display:flex; align-items:center; gap:4px; padding:1px 0;';
                item.innerHTML = `
                <svg width="18" height="18" viewBox="0 0 32 32" style="flex-shrink:0; filter:drop-shadow(0 1px 1px rgba(0,0,0,0.4));"><use href="#icon-${type}"/></svg>
                <span style="font-size:11px; color:#c0b090; white-space:nowrap;">${cfg.label}</span>
            `;
                legendItems.appendChild(item);
            });

            const specialSep = document.createElement('div');
            specialSep.style.cssText = 'grid-column:1/-1; border-top:1px solid rgba(200,184,138,0.15); margin:4px 0 2px; padding-top:4px; font-size:11px; color:#c8b88a; font-weight:600; letter-spacing:0.5px;';
            specialSep.textContent = '特殊标记';
            legendItems.appendChild(specialSep);

            const playerLegend = document.createElement('div');
            playerLegend.style.cssText = 'display:flex; align-items:center; gap:4px; padding:1px 0;';
            playerLegend.innerHTML = `
            <span style="display:inline-block;width:14px;height:14px;border-radius:50%;border:2px solid rgba(0,220,130,0.6);flex-shrink:0;"></span>
            <span style="font-size:11px; color:#00dc82; white-space:nowrap;">当前位置</span>
        `;
            legendItems.appendChild(playerLegend);
        }

        function render() {
            renderEdges();
            updateNodePositions();
            renderMinimap();
            if (editMode && deleteEdgeMode) updateEdgeHitAreas();
        }

        container.addEventListener('mousedown', (e) => {
            if (e.target.closest('.node-wrapper')) return;
            isDragging = true;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            dragViewX = viewX;
            dragViewY = viewY;
            container.classList.add('grabbing');
        });
        window.addEventListener('mousemove', (e) => {
            if (nodeDragging) {
                const dx = (e.clientX - nodeDragStartX) / scale / SPREAD;
                const dy = (e.clientY - nodeDragStartY) / scale / SPREAD;
                nodeDragging.x = nodeOrigX + dx;
                nodeDragging.y = nodeOrigY + dy;
                render();
                return;
            }
            if (!isDragging) return;
            viewX = dragViewX + (e.clientX - dragStartX) / scale;
            viewY = dragViewY + (e.clientY - dragStartY) / scale;
            render();
        });
        window.addEventListener('mouseup', () => {
            if (nodeDragging) { nodeDragging = null; return; }
            isDragging = false;
            container.classList.remove('grabbing');
        });

        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomFactor = e.deltaY < 0 ? 1.1 : 0.9;
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            const wx = (e.clientX - cx) / scale - viewX;
            const wy = (e.clientY - cy) / scale - viewY;
            scale *= zoomFactor;
            scale = Math.max(0.15, Math.min(3, scale));
            viewX = (e.clientX - cx) / scale - wx;
            viewY = (e.clientY - cy) / scale - wy;
            render();
        }, { passive: false });

        function zoomIn() { scale = Math.min(3, scale * 1.2); render(); }
        function zoomOut() { scale = Math.max(0.15, scale / 1.2); render(); }
        function resetView() {
            viewX = 0; viewY = 0; scale = 0.95; render();
        }
        window.zoomIn = zoomIn; window.zoomOut = zoomOut; window.resetView = resetView;

        let lastTouchDist = 0;
        container.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isDragging = true;
                dragStartX = e.touches[0].clientX;
                dragStartY = e.touches[0].clientY;
                dragViewX = viewX;
                dragViewY = viewY;
            } else if (e.touches.length === 2) {
                isDragging = false;
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                lastTouchDist = Math.sqrt(dx * dx + dy * dy);
            }
        }, { passive: true });
        container.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (e.touches.length === 1 && isDragging) {
                viewX = dragViewX + (e.touches[0].clientX - dragStartX) / scale;
                viewY = dragViewY + (e.touches[0].clientY - dragStartY) / scale;
                render();
            } else if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (lastTouchDist > 0) {
                    const zoomFactor = dist / lastTouchDist;
                    const cx = window.innerWidth / 2;
                    const cy = window.innerHeight / 2;
                    const tcx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                    const tcy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                    const wx = (tcx - cx) / scale - viewX;
                    const wy = (tcy - cy) / scale - viewY;
                    scale *= zoomFactor;
                    scale = Math.max(0.15, Math.min(3, scale));
                    viewX = (tcx - cx) / scale - wx;
                    viewY = (tcy - cy) / scale - wy;
                    render();
                }
                lastTouchDist = dist;
            }
        }, { passive: false });
        container.addEventListener('touchend', () => {
            isDragging = false;
            lastTouchDist = 0;
        });

        function toggleEditMode() {
            editMode = !editMode;
            deleteEdgeMode = false;
            const btn = document.getElementById('btn-edit-mode');
            const btnDel = document.getElementById('btn-delete-edge');
            const btnExp = document.getElementById('btn-export');
            const hint = document.getElementById('edit-hint');
            btn.classList.toggle('active', editMode);
            btnDel.style.display = editMode ? '' : 'none';
            btnExp.style.display = editMode ? '' : 'none';
            btnDel.classList.remove('active');
            hint.textContent = editMode ? '拖拽节点调整位置' : '';
            nodeElements.forEach(({ el }) => {
                el.classList.toggle('editing', editMode);
            });
            updateEdgeHitAreas();
        }

        function toggleDeleteEdge() {
            deleteEdgeMode = !deleteEdgeMode;
            const btn = document.getElementById('btn-delete-edge');
            const hint = document.getElementById('edit-hint');
            btn.classList.toggle('active', deleteEdgeMode);
            hint.textContent = deleteEdgeMode ? '点击连线中间的 × 删除' : '拖拽节点调整位置';
            updateEdgeHitAreas();
        }

        let edgeHitLayer = null;
        function updateEdgeHitAreas() {
            if (!edgeHitLayer) {
                edgeHitLayer = document.createElement('div');
                edgeHitLayer.id = 'edge-hit-layer';
                edgeHitLayer.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:3;';
                container.appendChild(edgeHitLayer);
            }
            edgeHitLayer.innerHTML = '';
            if (!editMode || !deleteEdgeMode) return;

            edges.forEach((e, idx) => {
                const src = nodeMap[e.source];
                const tgt = nodeMap[e.target];
                if (!src || !tgt) return;
                const s = worldToScreen(src.x, src.y);
                const t = worldToScreen(tgt.x, tgt.y);
                const mx = (s.x + t.x) / 2;
                const my = (s.y + t.y) / 2;

                const btn = document.createElement('div');
                btn.className = 'edge-delete-hit';
                btn.style.cssText = `
                left:${mx - 12}px; top:${my - 12}px; width:24px; height:24px;
                background:rgba(180,50,50,0.8); border-radius:50%; pointer-events:auto;
                display:flex; align-items:center; justify-content:center;
                font-size:14px; color:#fff; cursor:pointer; border:1px solid rgba(255,100,100,0.5);
            `;
                btn.textContent = '×';
                btn.title = `删除: ${e.label || e.source + ' → ' + e.target}`;
                btn.addEventListener('click', (ev) => {
                    ev.stopPropagation();
                    deletedEdges.push(edges.splice(idx, 1)[0]);
                    render();
                    updateEdgeHitAreas();
                });
                edgeHitLayer.appendChild(btn);
            });
        }

        function exportData() {
            const exportObj = JSON.parse(JSON.stringify(mapData));
            exportObj.nodes = nodes.map(n => {
                const copy = {};
                for (const [k, v] of Object.entries(n)) {
                    copy[k] = v;
                }
                copy.x = Math.round(n.x * 100) / 100;
                copy.y = Math.round(n.y * 100) / 100;
                return copy;
            });
            exportObj.edges = edges.map(e => ({ ...e }));

            const jsonStr = JSON.stringify({ mapData: exportObj }, null, 2);
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `第${currentLayerIndex + 1}层_地图.json`;
            a.click();
            URL.revokeObjectURL(url);

            document.getElementById('edit-hint').textContent = `已导出 第${currentLayerIndex + 1}层 数据`;
            setTimeout(() => {
                if (editMode) document.getElementById('edit-hint').textContent = '拖拽节点调整位置';
            }, 3000);
        }

        window.toggleEditMode = toggleEditMode;
        window.toggleDeleteEdge = toggleDeleteEdge;
        window.exportData = exportData;

        // ============ 图层切换 ============
        async function switchLayer(layerIdx) {
            if (layerIdx === currentLayerIndex) return;
            currentLayerIndex = layerIdx;
            const newData = LAYER_CONFIGS[layerIdx].data.mapData;
            mapData = newData;
            nodes = mapData.nodes;
            edges = mapData.edges || [];
            nodeMap = {};
            nodes.forEach(n => { nodeMap[n.id] = n; });

            document.getElementById('map-title').textContent = mapData.title || (layerIdx === 0 ? '迪斯博德 · 行星' : '红月 · 卫星');

            viewX = 0; viewY = 0; scale = 0.95;

            createNodeElements();
            buildLegend();
            render();
            updatePlayerLocation();

            document.querySelectorAll('#layer-switcher .layer-btn').forEach((btn, idx) => {
                if (idx === layerIdx) {
                    btn.classList.add('active');
                    btn.style.background = 'rgba(200,168,80,0.25)';
                    btn.style.color = '#f0e4c4';
                } else {
                    btn.classList.remove('active');
                    btn.style.background = 'transparent';
                    btn.style.color = '#8a8a7a';
                }
            });
        }
        window.switchLayer = switchLayer;

        // ============ 玩家位置标记 ============
        let _mvuLocation = { 场所: '', 区域: '', 大陆: '' };
        let lastMatchedNodeId = null;

        function removePlayerMarker() {
            document.querySelectorAll('.special-marker-player, .special-badge-player').forEach(el => el.remove());
        }

        function normalizeStr(s) {
            return s.replace(/\s+/g, '').replace(/·/g, '·').replace(/\./g, '·').replace(/・/g, '·').replace(/‧/g, '·').toLowerCase();
        }

        function findMatchingNode(场所, 区域, 大陆) {
            const candidates = [场所, 区域, 大陆].filter(Boolean);
            for (const locName of candidates) {
                const exact = nodes.find(n => n.name === locName);
                if (exact) return exact;
            }
            for (const locName of candidates) {
                if (!locName) continue;
                const norm = normalizeStr(locName);
                const match = nodes.find(n => normalizeStr(n.name) === norm);
                if (match) return match;
            }
            for (const locName of candidates) {
                if (!locName || locName.length < 2) continue;
                const norm = normalizeStr(locName);
                const fuzzy = nodes.find(n => {
                    const nn = normalizeStr(n.name);
                    return nn.includes(norm) || norm.includes(nn);
                });
                if (fuzzy) return fuzzy;
            }
            for (const locName of candidates) {
                if (!locName) continue;
                const parts = locName.split(/[·・‧.\s]+/).filter(p => p.length >= 2);
                for (const part of parts) {
                    const normPart = normalizeStr(part);
                    const match = nodes.find(n => {
                        const nn = normalizeStr(n.name);
                        return nn.includes(normPart) || normPart.includes(nn);
                    });
                    if (match) return match;
                }
            }
            return null;
        }

        function updatePlayerLocation() {
            const 场所 = _mvuLocation.场所 || '';
            const 区域 = _mvuLocation.区域 || '';
            const 大陆 = _mvuLocation.大陆 || '';

            if (!场所 && !区域 && !大陆) {
                removePlayerMarker();
                lastMatchedNodeId = null;
                return;
            }

            const matchedNode = findMatchingNode(场所, 区域, 大陆);

            if (!matchedNode) {
                removePlayerMarker();
                lastMatchedNodeId = null;
                return;
            }

            if (lastMatchedNodeId === matchedNode.id && document.querySelector('.special-badge-player')) return;

            removePlayerMarker();
            lastMatchedNodeId = matchedNode.id;

            const wrapper = nodeLayer.querySelector(`.node-wrapper[data-id="${matchedNode.id}"]`);
            if (!wrapper) return;

            const markerBg = document.createElement('div');
            markerBg.className = 'special-marker-player';
            markerBg.style.cssText = 'width:100%;height:100%;position:absolute;top:0;left:0;';
            const iconDiv = wrapper.querySelector('.node-icon');
            if (iconDiv) wrapper.insertBefore(markerBg, iconDiv);
            else wrapper.prepend(markerBg);

            const displayName = 场所 || 区域 || matchedNode.name;
            const badge = document.createElement('div');
            badge.className = 'special-badge-player';
            badge.textContent = `📍 ${displayName}`;
            wrapper.appendChild(badge);
        }

        window.addEventListener('message', (e) => {
            if (e.data && e.data.type === 'mvu_location' && e.data.位置) {
                _mvuLocation = e.data.位置;
                updatePlayerLocation();
            }
        });

        try { window.parent.postMessage({ type: 'map_ready' }, '*'); } catch (e) { }

        const _origRenderMinimap = renderMinimap;
        renderMinimap = function () {
            _origRenderMinimap();
            if (!lastMatchedNodeId) return;
            const node = nodeMap[lastMatchedNodeId];
            if (!node) return;
            const dpr = devicePixelRatio;
            const mw = 150 * dpr, mh = 120 * dpr;
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            nodes.forEach(n => {
                const wx = n.x * SPREAD, wy = n.y * SPREAD;
                if (wx < minX) minX = wx; if (wx > maxX) maxX = wx;
                if (wy < minY) minY = wy; if (wy > maxY) maxY = wy;
            });
            const pad = 100;
            minX -= pad; maxX += pad; minY -= pad; maxY += pad;
            const rangeX = maxX - minX, rangeY = maxY - minY;
            const mScale = Math.min(mw / rangeX, mh / rangeY) * 0.9;
            const offX = (mw - rangeX * mScale) / 2;
            const offY = (mh - rangeY * mScale) / 2;
            const px = offX + (node.x * SPREAD - minX) * mScale;
            const py = offY + (node.y * SPREAD - minY) * mScale;
            minimapCtx.fillStyle = '#00dc82';
            minimapCtx.beginPath();
            minimapCtx.arc(px, py, 4 * dpr, 0, Math.PI * 2);
            minimapCtx.fill();
            minimapCtx.strokeStyle = 'rgba(0,220,130,0.5)';
            minimapCtx.lineWidth = 1.5 * dpr;
            minimapCtx.beginPath();
            minimapCtx.arc(px, py, 6 * dpr, 0, Math.PI * 2);
            minimapCtx.stroke();
        };

        createNodeElements();
        buildLegend();
        resizeCanvas();

        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            return this;
        };
    </script>
